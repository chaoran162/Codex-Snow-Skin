name: Windows tests

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: windows-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Run PowerShell and Node tests
        shell: powershell
        run: powershell -NoProfile -ExecutionPolicy Bypass -File ".\skills\codex-snow-skin\tests\run-tests.ps1"
